@if (paginatedMembers(); as paginatedResult) {
  <div class="flex flex-col w-full">
    <div class="flex justify-between items-center">
      <div class="flex items-center gap-3">
        <button (click)="openModal()" class="btn btn-primary">Select Filters</button>
        <button (click)="resetFilters()" class="btn btn-neutral">Reset Filters</button>
        @if (diaplayFilters != '') {
          <div class="text-lg bg-base-100 py-2 px-4 border-2 rounded-lg text-primary capitalize">
            {{ diaplayFilters }}
          </div>
        }
      </div>
      @if (paginatedResult.metaData; as metadata) {
        <app-paginator
          [pageNumber]="metadata.currentPage"
          [totalCount]="metadata.totalCount"
          [pageSize]="metadata.pageSize"
          [totalPages]="metadata.totalPages"
          (pageChange)="onPageChange($event)"
        ></app-paginator>
      }
    </div>
    @if (paginatedResult.items; as members) {
      <div class="grid grid-cols-5 gap-6">
        @for (member of members; track member.id) {
          <app-member-card [member]="member"></app-member-card>
        }
      </div>
    }
  </div>
}

<app-modal [(isOpen)]="isFilterModal" title="Select Filters">
  <div class="flex flex-col w-full mt-6 gap-6">
    <div class="flex justify-between items-center w-full">
      <div class="flex flex-col w-full gap-4">
        <label class="flex justify-between items-center">
          <span class="font-semibold">Select gender:</span>
          <form class="filter">
            <input type="reset" value="x" class="btn btn-square" />
            <input
              type="radio"
              class="btn"
              [(ngModel)]="memberParams.gender"
              aria-label="Male"
              name="gender"
              value="male"
            />
            <input
              type="radio"
              class="btn"
              [(ngModel)]="memberParams.gender"
              aria-label="Female"
              name="gender"
              value="female"
            />
          </form>
        </label>
        <label class="flex justify-between items-center">
          <span class="font-semibold">Select Age:</span>
          <div class="flex gap-3">
            <input
              type="number"
              class="input w-20"
              [min]="18"
              [(ngModel)]="memberParams.minAge"
              name="minAge"
              (change)="onMinAgeChange()"
            />
            <input
              type="number"
              class="input w-20"
              [min]="memberParams.minAge || 18"
              [(ngModel)]="memberParams.maxAge"
              name="maxAge"
              (change)="onMaxAgeChange()"
            />
          </div>
        </label>
        <label class="flex justify-between items-center">
          <span class="font-semibold">Order By:</span>
          <select name="orderBy" class="select w-56" [(ngModel)]="memberParams.orderBy">
            <option disabled selected>Order by</option>
            <option value="created">Newest members</option>
            <option value="lastActive">Last active</option>
          </select>
        </label>
      </div>
    </div>
    <div class="flex justify-end">
      <button class="btn btn-primary" (click)="onSubmit()">Submit</button>
    </div>
  </div>
</app-modal>
