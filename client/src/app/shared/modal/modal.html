<dialog #commonModal class="modal" (close)="onNativeClose($event)">
  <div class="modal-box">
    <h3 class="text-lg font-bold">{{ title() }}</h3>
    <main>
      <ng-content></ng-content>
    </main>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button (click)="close()">Close</button>
  </form>
</dialog>
