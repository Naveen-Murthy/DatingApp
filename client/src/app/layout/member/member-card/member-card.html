@if (member(); as member) {
  <div
    routerLink="/members/{{ member.id }}"
    class="card cursor-pointer transition-all duration-300 ease-in-out transform hover:-translate-y-2"
  >
    <img
      class="rounded-lg"
      [src]="member?.imageUrl || '/user.png'"
      [alt]="member.displayName + ' image'"
    />
    <div
      class="card-actions z-50 absolute bottom-0 w-full px-3 py-1 rounded-b-lg bg-linear-to-t from-black via-black/75 to-transparent"
    >
      <div class="flex flex-col text-white">
        <h5 class="font-semibold">{{ member.displayName }}, {{ member.dateofBirth | age }}</h5>
        <p class="text-sm">{{ member.city }}</p>
      </div>
    </div>
  </div>
}
